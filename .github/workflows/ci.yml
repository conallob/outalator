name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GOLANGCI_LINT_VERSION: v2.12.2

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage to Codecov
        # continue-on-error handles fork PRs (no secrets) and Codecov downtime.
        uses: codecov/codecov-action@13ce06bfc6bbe3ecf90edbbf1bc32fe5978ca1d3  # v5.3.1
        with:
          files: coverage.out
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  test-sqlite:
    name: Tests (SQLite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run SQLite storage tests
        # Scope is intentionally limited to ./internal/storage/sqlite/... today.
        # Broaden this pattern if other -tags sqlite packages are added.
        run: |
          go test -v -race -tags sqlite \
            -coverprofile=coverage-sqlite.out \
            -covermode=atomic \
            ./storage/sqlite/...

      - name: Upload SQLite coverage to Codecov
        # continue-on-error handles fork PRs (no secrets) and Codecov downtime.
        uses: codecov/codecov-action@13ce06bfc6bbe3ecf90edbbf1bc32fe5978ca1d3  # v5.3.1
        with:
          files: coverage-sqlite.out
          flags: sqlite
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@971e284b6050e8a5849b72094c50ab08da042db8  # v6.1.1
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}

      - name: golangci-lint (SQLite)
        uses: golangci/golangci-lint-action@971e284b6050e8a5849b72094c50ab08da042db8  # v6.1.1
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --build-tags sqlite ./storage/sqlite/...

      - name: Check go.mod tidy
        # Must use GOFLAGS="-tags=sqlite" so modernc.org/sqlite (only imported
        # behind the sqlite build tag) is not stripped from go.mod by tidy.
        # A plain `go mod tidy` would always produce a diff and fail this step.
        run: |
          GOFLAGS="-tags=sqlite" go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Install protoc
        # ubuntu-24.04 ships protobuf-compiler 3.21.12 which matches the version
        # used to generate the committed .pb.go files (see api/proto/v1/ headers).
        # Using apt rather than a manual GitHub release download avoids network
        # policy restrictions on binary asset URLs in CI.
        run: |
          sudo apt-get install -y protobuf-compiler
          protoc --version | grep -q 'libprotoc 3.21.12' || { echo "unexpected protoc version: $(protoc --version)"; exit 1; }

      - name: Check proto files are up to date
        # Detects edits to outalator.proto that were not followed by `make proto`.
        # grpc-deps installs protoc-gen-go and protoc-gen-go-grpc.
        run: |
          make grpc-deps
          make proto
          git diff --exit-code api/proto/v1/
