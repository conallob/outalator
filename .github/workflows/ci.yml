name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        # Exclude packages that depend on generated proto code (not committed).
        # - internal/grpc: directly imports the generated package
        # - cmd/outalator: imports internal/grpc, so it fails transitively
        # Run `make proto` locally to generate the code and test these packages.
        run: |
          PKGS=$(go list ./... | grep -v '/grpc' | grep -v '/api/proto' | grep -v 'cmd/outalator')
          go test -v -race -coverprofile=coverage.out -covermode=atomic $PKGS

      - name: Upload coverage to Codecov
        if: ${{ secrets.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  test-sqlite:
    name: Tests (SQLite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run SQLite storage tests
        # Scope is intentionally limited to ./internal/storage/sqlite/... today.
        # Broaden this pattern if other -tags sqlite packages are added.
        run: |
          go test -v -race -tags sqlite \
            -coverprofile=coverage-sqlite.out \
            -covermode=atomic \
            ./internal/storage/sqlite/...

      - name: Upload SQLite coverage to Codecov
        if: ${{ secrets.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          files: coverage-sqlite.out
          flags: sqlite
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: |
          PKGS=$(go list ./... | grep -v '/grpc' | grep -v '/api/proto' | grep -v 'cmd/outalator')
          go vet $PKGS

      - name: go vet (SQLite)
        run: |
          go vet -tags sqlite ./internal/storage/sqlite/...

      - name: Check go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
