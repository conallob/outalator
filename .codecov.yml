coverage:
  ignore:
    # Generated protobuf files; coverage here is noise, not signal.
    - "api/proto/v1/*.pb.go"
    # Test helper infrastructure; not production code.
    - "internal/testutil/**"
  status:
    patch:
      default:
        # Patch coverage is informational; many changed files (Slack bot,
        # HTTP handlers, config) have no test infrastructure yet.
        informational: true
