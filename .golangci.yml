version: "2"

linters:
  disable-all: true
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    - gosec

  settings:
    errcheck:
      check-type-assertions: true

  exclusions:
    rules:
      # Generated proto files produce false positives from some linters.
      - path: 'api/proto/v1/.*\.pb\.go'
        linters: [unused, staticcheck, errcheck, gosec]
